# High-concurrency-oriented reverse proxy for gRPC (HTTP/2).
# Scale to very large audiences by running many Nginx + app replicas behind a global load balancer.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

# Raise file descriptor limits when the container allows it (also set in docker-compose).
worker_rlimit_nofile 100000;

events {
    worker_connections 65535;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $http_x_request_id [$time_local] "$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;

    upstream finora_grpc {
        server backend:50051;
        keepalive 64;
        keepalive_requests 10000;
        keepalive_timeout 60s;
    }

    server {
        listen 8080;
        listen [::]:8080;
        http2 on;

        # Large bodies for big unary messages (align with backend GRPC_MAX_RECV_MB).
        client_max_body_size 32m;
        client_body_timeout 60s;
        send_timeout 60s;

        location / {
            grpc_pass grpc://finora_grpc;
            grpc_set_header Host $host;
            grpc_set_header X-Real-IP $remote_addr;
            grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            grpc_set_header X-Request-ID $http_x_request_id;
            grpc_read_timeout 600s;
            grpc_send_timeout 600s;
        }
    }
}
