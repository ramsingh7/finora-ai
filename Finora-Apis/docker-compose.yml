services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - finora-pg-data:/var/lib/postgresql/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - finora-network  

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - finora-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - finora-network

  backend-init:
    image: busybox:1.36
    user: "0:0"
    volumes:
      - finora-backend-data:/data
    command: ["sh", "-c", "chown -R 65532:65532 /data"]
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: "0.1.0"
        COMMIT: "local"
        BUILDTIME: "docker"
    depends_on:
      backend-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - finora-backend-data:/data
    environment:
      ENV: production
      GRPC_HOST: "0.0.0.0"
      GRPC_PORT: "50051"
      DATA_DIR: /data
      LOG_LEVEL: info
      DATABASE_URL: ${DATABASE_URL}
      REDIS_ADDR: redis:6379
      REDIS_DB: "0"
      JWT_ISSUER: finora-backend
      JWT_EXPIRE_MINUTES: "60"
      # HS256 secret — replace in real deployments (min 32 chars; this is 64 hex).
      JWT_SECRET: ${JWT_SECRET}
    expose:
      - "50051"
    ports:
      - "50051:50051"
    restart: unless-stopped
    networks:
      - finora-network

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    restart: unless-stopped
    networks:
      - finora-network

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - finora-pgadmin-data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - finora-network

networks:
  finora-network:
    driver: bridge

volumes:
  finora-pg-data:
  finora-redis-data:
  finora-backend-data:
  finora-pgadmin-data:
